<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Sample Product Page</title>
</head>
<body>
    <header>
        <h1>My Shop</h1>
        <nav>
            <a href="/">Home</a>
            <a href="/products">Products</a>
            <a href="/contact">Contact</a>
        </nav>
    </header>

    <main>
        <section id="featured">
            <h2>Featured Products</h2>
            <div class="product-card">
                <h3 class="title">Super Widget</h3>
                <span class="price">$19.99</span>
                <p class="desc">The best widget ever.</p>
                <a class="buy-btn" href="/buy/123">Buy Now</a>
            </div>
            <div class="product-card">
                <h3 class="title">Mega Gadget</h3>
                <span class="price">$29.99</span>
                <p class="desc">You need this gadget.</p>
                <a class="buy-btn" href="/buy/456">Buy Now</a>
            </div>
        </section>

        <section id="specs">
            <h2>Specifications</h2>
            <table class="specs-table">
                <thead>
                    <tr><th>Feature</th><th>Value</th></tr>
                </thead>
                <tbody>
                    <tr><td>Weight</td><td>1.2 kg</td></tr>
                    <tr><td>Color</td><td>Silver</td></tr>
                    <tr><td>Warranty</td><td>2 Years</td></tr>
                </tbody>
            </table>
        </section>
    </main>
</body>
</html>
